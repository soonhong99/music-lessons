<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>음악 수업 뷰어</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ca: #E8732A;
  --cb: #2A6BE8;
  --ca-light: #FFF3E8;
  --cb-light: #E8F0FF;
  --ca-dark: #993C1D;
  --cb-dark: #185FA5;
  --ca-border: #F5C4B3;
  --cb-border: #B5D4F4;
  --text: #2C2C2A;
  --text-mid: #5F5E5A;
  --bg: #FFFEF5;
  --white: #ffffff;
  --green: #3B6D11;
  --green-bg: #EAF3DE;
  --green-border: #C0DD97;
  --red: #A32D2D;
  --red-bg: #FCEBEB;
  --slide-w: min(860px, 100vw);
  --slide-h: min(540px, 100vh);
}

html, body {
  width: 100%; height: 100%;
  background: #1a1a18;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Nanum Gothic', sans-serif;
  overflow: hidden;
}

#app {
  width: var(--slide-w);
  height: var(--slide-h);
  background: var(--bg);
  border-radius: 20px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── TOP BAR ── */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px 0;
  flex-shrink: 0;
}

#lesson-title-bar {
  font-family: 'Jua', sans-serif;
  font-size: 13px;
  color: var(--text-mid);
}

#dots-bar {
  display: flex;
  gap: 7px;
  align-items: center;
}

.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #DDD;
  transition: background 0.3s, transform 0.3s;
  cursor: pointer;
}
.dot.active { background: var(--ca); transform: scale(1.35); }

#slide-counter {
  font-size: 12px;
  color: var(--text-mid);
}

/* ── SLIDE AREA ── */
#slides-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.slide {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 16px 32px 12px;
  opacity: 0;
  transform: translateX(60px);
  transition: opacity 0.35s ease, transform 0.35s ease;
  pointer-events: none;
  overflow-y: auto;
}

.slide.active {
  opacity: 1;
  transform: translateX(0);
  pointer-events: all;
}

.slide.exit-left {
  opacity: 0;
  transform: translateX(-60px);
}

/* ── TYPOGRAPHY ── */
.slide-title {
  font-family: 'Jua', sans-serif;
  font-size: clamp(20px, 3vw, 28px);
  color: var(--text);
  text-align: center;
  margin-bottom: 4px;
  font-weight: 400;
}

.slide-subtitle {
  font-size: 13px;
  color: var(--text-mid);
  text-align: center;
  margin-bottom: 14px;
}

.desc-text {
  font-size: 14px;
  color: var(--text-mid);
  text-align: center;
  line-height: 1.8;
  white-space: pre-line;
}

/* ── CHARACTER ── */
.character {
  font-size: 44px;
  margin-bottom: 8px;
  animation: bounce 1.4s ease-in-out infinite;
  display: block;
  text-align: center;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-7px); }
}

/* ── CONCEPT CARDS ── */
.concept-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  width: 100%;
  max-width: 500px;
  margin-bottom: 14px;
}

.concept-card {
  border-radius: 16px;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
}

.concept-card.ca { background: var(--ca-light); border: 1.5px solid var(--ca-border); }
.concept-card.cb { background: var(--cb-light); border: 1.5px solid var(--cb-border); }

.concept-card .c-name {
  font-family: 'Jua', sans-serif;
  font-size: 16px;
}
.concept-card.ca .c-name { color: var(--ca-dark); }
.concept-card.cb .c-name { color: var(--cb-dark); }

.concept-card .c-desc {
  font-size: 12px;
  color: var(--text-mid);
  text-align: center;
  line-height: 1.5;
}

.analogy-box {
  background: var(--green-bg);
  border: 0.5px solid var(--green-border);
  border-radius: 12px;
  padding: 10px 18px;
  font-size: 13px;
  color: var(--green);
  text-align: center;
  max-width: 440px;
  line-height: 1.6;
}

/* ── SVG SYMBOLS ── */
svg.wedge { display: block; }

/* ── EXPERIENCE SLIDE ── */
.exp-label {
  font-family: 'Jua', sans-serif;
  font-size: 20px;
  margin-bottom: 8px;
}
.exp-label.ca { color: var(--ca-dark); }
.exp-label.cb { color: var(--cb-dark); }

.sound-visualizer {
  width: 100%;
  max-width: 480px;
  height: 150px;
  border-radius: 16px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}
.sound-visualizer.ca { background: #FAECE7; }
.sound-visualizer.cb { background: #E6F1FB; }

.ripple-container {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ripple {
  position: absolute;
  border-radius: 50%;
  opacity: 0;
}
@keyframes rippleAnim {
  0%  { transform: scale(0.3); opacity: 0.75; }
  100%{ transform: scale(1);   opacity: 0; }
}

.center-dot {
  width: 22px; height: 22px;
  border-radius: 50%;
  z-index: 2;
  transition: transform 0.1s;
  flex-shrink: 0;
}
.center-dot.ca { background: var(--ca); }
.center-dot.cb { background: var(--cb); }

.size-emoji {
  position: absolute;
  right: 14px; bottom: 10px;
  font-size: 20px;
  pointer-events: none;
}

.progress-wrap {
  width: 100%;
  max-width: 480px;
  height: 7px;
  background: #EEE;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
}
.progress-fill {
  height: 100%;
  border-radius: 8px;
  width: 0%;
  transition: width 0.05s linear;
}
.progress-fill.ca { background: var(--ca); }
.progress-fill.cb { background: var(--cb); }

/* ── COMPARE SLIDE ── */
.compare-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  width: 100%;
  max-width: 500px;
}

.mini-card {
  border-radius: 14px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: transform 0.15s;
}
.mini-card:hover { transform: translateY(-2px); }
.mini-card.ca { background: var(--ca-light); border: 1.5px solid var(--ca-border); }
.mini-card.cb { background: var(--cb-light); border: 1.5px solid var(--cb-border); }

.mini-label {
  font-family: 'Jua', sans-serif;
  font-size: 15px;
}
.mini-card.ca .mini-label { color: var(--ca-dark); }
.mini-card.cb .mini-label { color: var(--cb-dark); }

.mini-vis {
  width: 100%;
  height: 72px;
  border-radius: 10px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.mini-vis.ca { background: #FAECE7; }
.mini-vis.cb { background: #E6F1FB; }

.mini-desc {
  font-size: 12px;
  color: var(--text-mid);
  text-align: center;
  line-height: 1.5;
}

/* ── QUIZ SLIDE ── */
.quiz-q-text {
  font-family: 'Jua', sans-serif;
  font-size: clamp(15px, 2.5vw, 18px);
  color: var(--text);
  text-align: center;
  margin-bottom: 12px;
  line-height: 1.5;
  max-width: 440px;
}

.quiz-options {
  display: flex;
  flex-direction: column;
  gap: 9px;
  width: 100%;
  max-width: 380px;
}

.quiz-opt {
  font-family: 'Nanum Gothic', sans-serif;
  font-size: 15px;
  padding: 12px 18px;
  border-radius: 12px;
  border: 2px solid #DDD;
  background: var(--white);
  cursor: pointer;
  text-align: left;
  transition: border-color 0.2s, background 0.2s, transform 0.1s;
  color: var(--text);
}
.quiz-opt:hover:not(:disabled) { border-color: #AAA; background: #FAFAFA; }
.quiz-opt:active:not(:disabled) { transform: scale(0.98); }
.quiz-opt.correct { border-color: var(--green); background: var(--green-bg); color: var(--green); }
.quiz-opt.wrong   { border-color: var(--red);   background: var(--red-bg);   color: var(--red); }
.quiz-opt:disabled { cursor: default; }

.quiz-result {
  font-family: 'Jua', sans-serif;
  font-size: 16px;
  text-align: center;
  min-height: 24px;
  margin-top: 6px;
}
.quiz-result.ok  { color: var(--green); }
.quiz-result.bad { color: var(--red); }

.quiz-meta {
  font-size: 12px;
  color: var(--text-mid);
  margin-bottom: 8px;
}

/* ── RESULT SLIDE ── */
.score-num {
  font-family: 'Jua', sans-serif;
  font-size: 48px;
  color: var(--ca);
  text-align: center;
  margin: 8px 0;
}

.finish-msg {
  font-size: 14px;
  color: var(--text-mid);
  text-align: center;
  line-height: 1.8;
  max-width: 340px;
  margin-bottom: 14px;
}

.summary-cards {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

/* ── BUTTONS ── */
.btn {
  font-family: 'Jua', sans-serif;
  font-size: 15px;
  padding: 10px 26px;
  border-radius: 32px;
  border: none;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.3; cursor: default; }
.btn-primary   { background: var(--ca); color: white; }
.btn-secondary { background: #EEE; color: var(--text); }
.btn-blue      { background: var(--cb); color: white; }
.btn-green     { background: #639922; color: white; }
.btn-ca        { background: var(--ca); color: white; }
.btn-cb        { background: var(--cb); color: white; }

/* ── BOTTOM NAV ── */
#bottom-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 24px 14px;
  flex-shrink: 0;
}

/* ── LOADING ── */
#loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
  background: var(--bg);
  z-index: 100;
}
#loading p { font-family: 'Jua', sans-serif; font-size: 16px; color: var(--text-mid); }

/* ── FILE PICKER (when no ?lesson= param) ── */
#file-picker {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  background: var(--bg);
  z-index: 100;
}
#file-picker h2 { font-family: 'Jua', sans-serif; font-size: 22px; color: var(--text); }
#file-picker p  { font-size: 13px; color: var(--text-mid); text-align: center; line-height: 1.7; max-width: 320px; }
#file-input { display: none; }
#file-drop-zone {
  border: 2px dashed #BBB;
  border-radius: 16px;
  padding: 28px 40px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
#file-drop-zone:hover { border-color: var(--ca); background: var(--ca-light); }
#file-drop-zone p { font-size: 14px; color: var(--text-mid); margin-top: 8px; }

/* ── FULLSCREEN HINT ── */
#fs-hint {
  position: absolute;
  bottom: 10px; right: 16px;
  font-size: 11px;
  color: #BBB;
  cursor: pointer;
  user-select: none;
}
#fs-hint:hover { color: var(--text-mid); }

/* ── TIMELINE ── */
.timeline-scroll {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 4px;
}
.timeline-row {
  display: flex;
  align-items: center;
  gap: 4px;
  min-width: max-content;
  padding: 4px 8px;
}
.era-pill {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 7px 10px 6px;
  border-radius: 12px;
  background: #F5F5F0;
  border: 1.5px solid #E0E0DA;
  flex-shrink: 0;
  min-width: 66px;
  transition: transform 0.2s;
}
.era-pill.hl {
  background: var(--ca-light);
  border-color: var(--ca);
  transform: scale(1.1);
  animation: pulseEra 1.6s ease-in-out infinite;
}
@keyframes pulseEra {
  0%,100% { box-shadow: 0 0 0 0 rgba(200,134,10,.35); }
  50%      { box-shadow: 0 0 0 8px rgba(200,134,10,0); }
}
.era-emoji { font-size: 20px; line-height: 1; }
.era-name  { font-family: 'Jua', sans-serif; font-size: 11px; color: var(--text); text-align: center; }
.era-year  { font-size: 9px; color: #BBB; text-align: center; }
.era-extra { font-size: 9px; color: #AAA; text-align: center; display: none; }
.era-pill.hl .era-name  { color: var(--ca-dark); font-size: 12px; }
.era-pill.hl .era-year  { color: var(--ca); }
.era-pill.hl .era-extra { display: block; color: var(--ca-dark); font-weight: bold; }
.era-arrow { color: #CCC; font-size: 16px; flex-shrink: 0; user-select: none; }

/* ── FEATURES ── */
.features-list {
  display: flex;
  flex-direction: column;
  gap: 9px;
  width: 100%;
  max-width: 580px;
  margin-bottom: 8px;
}
.feature-row {
  display: flex;
  gap: 12px;
  border-radius: 14px;
  padding: 11px 14px;
  align-items: flex-start;
  background: var(--ca-light);
  border: 1.5px solid var(--ca-border);
}
.feature-icon  { font-size: 26px; flex-shrink: 0; line-height: 1; padding-top: 1px; }
.feature-body  { display: flex; flex-direction: column; gap: 2px; }
.feature-title { font-family: 'Jua', sans-serif; font-size: 14px; color: var(--ca-dark); }
.feature-desc  { font-size: 12px; color: var(--text-mid); line-height: 1.6; white-space: pre-line; }

/* ── COMPOSER ── */
.composer-card {
  display: flex;
  gap: 12px;
  border-radius: 14px;
  padding: 10px 14px;
  width: 100%;
  max-width: 520px;
  margin-bottom: 8px;
  align-items: flex-start;
}
.composer-card.ca { background: var(--ca-light); border: 1.5px solid var(--ca-border); }
.composer-card.cb { background: var(--cb-light); border: 1.5px solid var(--cb-border); }
.composer-avatar { font-size: 36px; flex-shrink: 0; line-height: 1; padding-top: 2px; }
.composer-info   { display: flex; flex-direction: column; gap: 3px; }
.composer-name   { font-family: 'Jua', sans-serif; font-size: 15px; }
.composer-card.ca .composer-name { color: var(--ca-dark); }
.composer-card.cb .composer-name { color: var(--cb-dark); }
.composer-sub    { font-size: 10px; color: var(--text-mid); }
.composer-nick   {
  display: inline-block; font-size: 10px; padding: 2px 7px;
  border-radius: 8px; background: white; font-family: 'Jua', sans-serif; align-self: flex-start;
}
.composer-card.ca .composer-nick { color: var(--ca-dark); }
.composer-card.cb .composer-nick { color: var(--cb-dark); }
.composer-fact   { font-size: 11px; color: var(--text); line-height: 1.45; white-space: pre-line; margin-top: 1px; }
.composer-work   { font-size: 10px; color: var(--text-mid); margin-top: 2px; }

/* ── YOUTUBE ── */
.yt-wrap  { width: 100%; max-width: 480px; }
.yt-title { font-family: 'Jua', sans-serif; font-size: 12px; color: var(--text-mid); margin-bottom: 5px; }
.yt-frame-wrap { width: 100%; display: flex; justify-content: center; }
.yt-frame {
  aspect-ratio: 16/9;
  max-height: 140px;
  width: auto;
  max-width: 100%;
  margin: 0 auto;
  border-radius: 12px;
  border: 0;
  display: block;
  background: #000;
}
.yt-desc  { font-size: 11px; color: var(--text-mid); margin-top: 5px; text-align: center; line-height: 1.5; }

/* ── PIECE STORY ── */
.piece-story-box {
  width: 100%;
  background: #FFF8F0;
  border: 1px solid #F0DEC8;
  border-radius: 10px;
  padding: 7px 12px 8px;
  margin-bottom: 5px;
}
.piece-story-label {
  font-family: 'Jua', sans-serif;
  font-size: 11px;
  color: #8B5E30;
  margin-bottom: 3px;
}
.piece-story-text {
  font-size: 11px;
  color: var(--text);
  line-height: 1.55;
  white-space: pre-line;
}

/* ── YOUTUBE LINK ── */
.yt-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: 'Jua', sans-serif;
  font-size: 12px;
  color: #CC0000;
  text-decoration: none;
  padding: 4px 12px;
  border-radius: 16px;
  border: 1px solid #FFAAAA;
  background: #FFF5F5;
  margin-top: 6px;
  transition: background 0.15s, transform 0.1s;
  flex-shrink: 0;
}
.yt-link:hover  { background: #FFE5E5; }
.yt-link:active { transform: scale(0.97); }

/* ── REVIEW (이전 수업 복습) ── */
.review-era-badge {
  font-family: 'Jua', sans-serif;
  font-size: 15px;
  padding: 6px 18px;
  border-radius: 20px;
  background: #F0EDE8;
  border: 1.5px solid #D5D0C8;
  color: #4A4540;
  margin-bottom: 12px;
  display: inline-block;
}
.review-points {
  display: flex;
  flex-direction: column;
  gap: 7px;
  width: 100%;
  max-width: 480px;
  margin-bottom: 12px;
}
.review-point {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #F8F6F3;
  border: 1px solid #E8E4DE;
  border-radius: 10px;
  padding: 8px 14px;
  font-size: 13px;
  color: var(--text);
}
.review-point-emoji { font-size: 18px; flex-shrink: 0; }
.review-composers {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.review-comp {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  background: #F0EDE8;
  border: 1px solid #D5D0C8;
  border-radius: 12px;
  padding: 8px 16px;
}
.review-comp-emoji { font-size: 22px; }
.review-comp-vex {
  width: 92px; height: 78px;
  display: flex; align-items: center; justify-content: center;
  background: white; border-radius: 8px; overflow: hidden;
}
/* VexFlow sets an inline style="width:...;height:..." on its <svg> —
   !important is required to override it and make the badge scale up. */
.review-comp-vex svg { display: block; width: 100% !important; height: 100% !important; }
.review-comp-name  { font-family: 'Jua', sans-serif; font-size: 13px; color: #6A6460; }
.review-next {
  font-family: 'Jua', sans-serif;
  font-size: 13px;
  color: var(--ca-dark);
  padding: 7px 20px;
  border-radius: 20px;
  background: var(--ca-light);
  border: 1.5px solid var(--ca-border);
}

/* ── LISTEN TIPS ── */
.listen-box {
  width: 100%;
  background: var(--green-bg);
  border: 1px solid var(--green-border);
  border-radius: 10px;
  padding: 7px 12px 8px;
  margin-bottom: 6px;
}
.listen-label {
  font-family: 'Jua', sans-serif;
  font-size: 11px;
  color: var(--green);
  margin-bottom: 3px;
}
.listen-item {
  font-size: 11px;
  color: var(--green);
  line-height: 1.5;
}

/* ── TEMPO SLIDE ── */
.tempo-card {
  border-radius: 14px;
  padding: 10px 14px;
  width: 100%;
  max-width: 520px;
  margin-bottom: 8px;
}
.tempo-card.ca { background: var(--ca-light); border: 1.5px solid var(--ca-border); }
.tempo-card.cb { background: var(--cb-light); border: 1.5px solid var(--cb-border); }
.tempo-main-row { display: flex; gap: 12px; align-items: flex-start; }
.staff-mini-wrap { flex-shrink: 0; }
.staff-mini {
  background: white;
  border: 1px solid #DDD;
  border-radius: 8px;
  padding: 5px 10px 6px;
  width: 130px;
}
.staff-mini-header {
  display: flex;
  align-items: baseline;
  gap: 4px;
  margin-bottom: 4px;
}
.staff-mini-clef { font-size: 22px; line-height: 1; color: #333; flex-shrink: 0; }
.staff-mini-word {
  font-family: Georgia, 'Times New Roman', serif;
  font-style: italic;
  font-weight: bold;
  font-size: 13px;

<script>
let L = null;
let currentIdx = 0;
let totalSlides = 0;
let audioCtx = null;
let quizState = { current: 0, score: 0, answered: false };
const slideEls = [];
const NOTE_FREQ = {
  C4:261.63, D4:293.66, E4:329.63, F4:349.23,
  G4:392.00, A4:440.00, B4:493.88, C5:523.25
};

/* violin PeriodicWave — Fourier harmonics approximating bowed string timbre */
let _violinWave = null, _violinWaveCtx = null;
function getViolinWave(ctx) {
  if (!_violinWave || _violinWaveCtx !== ctx) {
    const real = new Float32Array([0, 1, 0.60, 0.40, 0.22, 0.14, 0.09, 0.06, 0.04, 0.02]);
    const imag = new Float32Array(real.length);
    _violinWave = ctx.createPeriodicWave(real, imag);
    _violinWaveCtx = ctx;
  }
  return _violinWave;
}

/* ── AUDIO ── */
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(cfg, onProgress, onDone) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(cfg.freq, ctx.currentTime);
  gain.gain.setValueAtTime(cfg.start_gain, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(cfg.end_gain, ctx.currentTime + cfg.duration);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + cfg.duration);
  const t0 = Date.now();
  const iv = setInterval(() => {
    const p = Math.min((Date.now() - t0) / 1000 / cfg.duration, 1);
    if (onProgress) onProgress(p);
    if (p >= 1) { clearInterval(iv); if (onDone) onDone(); }
  }, 50);
}

/* ── RIPPLES ── */
function animateRipples(containerId, color, progress, minR, maxR) {
  const c = document.getElementById(containerId);
  if (!c) return;
  c.innerHTML = '';
  const r = minR + (maxR - minR) * progress;
  for (let i = 0; i < 3; i++) {
    const el = document.createElement('div');
    el.className = 'ripple';
    const s = r * (0.45 + i * 0.28);
    el.style.cssText = `width:${s}px;height:${s}px;border:2px solid ${color};position:absolute;border-radius:50%;animation:rippleAnim 1.5s ${i*0.5}s infinite ease-out;`;
    c.appendChild(el);
  }
}

function clearRipples(id) {
  const c = document.getElementById(id); if (c) c.innerHTML = '';
}

function sizeEmoji(p, reverse) {
  if (reverse) p = 1 - p;
  return p < 0.33 ? '🔈' : p < 0.66 ? '🔉' : '🔊';
}

    return `<svg class="wedge" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      <polyline points="${w*0.25},${h*0.25} ${w*0.75},${h/2} ${w*0.25},${h*0.75}"
        fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
  if (type === 'plain')
    return `<svg class="wedge" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      <circle cx="${w/2}" cy="${h/2}" r="${Math.min(w,h)*0.22}" fill="${color}"/>
      <line x1="${w/2 + Math.min(w,h)*0.18}" y1="${h/2}" x2="${w/2 + Math.min(w,h)*0.18}" y2="3"
        stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
    </svg>`;
  if (type === 'crescendo')
    return `<svg class="wedge" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      <line x1="2" y1="${h/2}" x2="${w-2}" y2="2"    stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="2" y1="${h/2}" x2="${w-2}" y2="${h-2}" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
    </svg>`;
  return `<svg class="wedge" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <line x1="2" y1="2"    x2="${w-2}" y2="${h/2}" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="2" y1="${h-2}" x2="${w-2}" y2="${h/2}" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
  </svg>`;
}

function playDynamic(slideId) {
  const el = slideEls.find(e => e.id === slideId);
  if (!el || !el._dynState) return;
  const { gain, melody, rId, dotId, btnId, color } = el._dynState;
  const btn = document.getElementById(btnId);
  if (btn) { btn.disabled = true; btn.textContent = '▶ 재생 중...'; }
  const ctx = getAudioCtx();
  const noteDur = 0.36;
  const noteGap = 0.04;
  melody.forEach((note, i) => {
    const freq = NOTE_FREQ[note] || 440;
    const t = ctx.currentTime + i * (noteDur + noteGap);
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.setPeriodicWave(getViolinWave(ctx));
    osc.frequency.setValueAtTime(freq, t);
    const lfo = ctx.createOscillator(), lfoG = ctx.createGain();
    lfo.type = 'sine'; lfo.frequency.setValueAtTime(5.5, t);
    lfoG.gain.setValueAtTime(0, t);
    lfoG.gain.linearRampToValueAtTime(freq * 0.015, t + 0.08);
    lfoG.gain.setValueAtTime(freq * 0.015, t + noteDur - 0.07);
    lfoG.gain.linearRampToValueAtTime(0, t + noteDur);
    lfo.connect(lfoG); lfoG.connect(osc.frequency);
    lfo.start(t); lfo.stop(t + noteDur + 0.01);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(gain, t + 0.03);
    g.gain.setValueAtTime(gain, t + noteDur - 0.06);
    g.gain.linearRampToValueAtTime(0, t + noteDur);
    osc.start(t); osc.stop(t + noteDur + 0.01);
    setTimeout(() => {
      const rippleR = 15 + gain * 115;
      animateRipples(rId, color, 0.5, rippleR * 0.5, rippleR);
      const dotEl = document.getElementById(dotId);
      if (dotEl) dotEl.style.transform = `scale(${0.9 + gain * 3})`;
    }, i * (noteDur + noteGap) * 1000);
  });
  const total = melody.length * (noteDur + noteGap);
  setTimeout(() => {
    if (btn) { btn.disabled = false; btn.textContent = '▶ 다시 들어보기'; }
    const dotEl = document.getElementById(dotId);
    if (dotEl) dotEl.style.transform = 'scale(1)';
    clearRipples(rId);
  }, total * 1000 + 300);
}

/* ── VEXFLOW RENDER QUEUE (generic) ── */
let _pendingVexRenders = [];

function queueVexRender(fn) {
  // Always defer: the slide element isn't attached to the DOM yet when
  // build*() runs, so rendering must wait until after appendChild + flush.
  _pendingVexRenders.push(fn);
}

function flushVexRenders() {
  if (!window.Vex) { setTimeout(flushVexRenders, 80); return; }
  const pending = _pendingVexRenders.splice(0);
  pending.forEach(fn => fn());
}

function renderVexRest(id, restType, color) {
  const container = document.getElementById(id);
  if (!container) return;

  container.innerHTML = '';
  const { Renderer, Stave, StaveNote, Formatter } = Vex.Flow;

  // NOTE: Stave's y-param is not the y of its top line — empirically the
  // 5 lines render ~40px below the y passed to `new Stave(...)`. Using a
  // negative offset here pulls the lines up so they (and the rest glyph)
  // sit inside the canvas with even margins instead of being pushed low
  // and clipped at the bottom.
  const W = 110, H = 70;
  const renderer = new Renderer(container, Renderer.Backends.SVG);
  renderer.resize(W, H);
  const ctx = renderer.getContext();

  // Staff lines in neutral gray
  ctx.setFillStyle('#AAAAAA');
  ctx.setStrokeStyle('#AAAAAA');
  const stave = new Stave(5, -25, W - 12);
  stave.setContext(ctx).draw();

  // Rest glyph in theme color
  ctx.setFillStyle(color);
  ctx.setStrokeStyle(color);
  const durMap = { whole: '1r', half: '2r', quarter: '4r', eighth: '8r' };
  const note = new StaveNote({ clef: 'treble', keys: ['b/4'], duration: durMap[restType] || '4r' });
  Formatter.FormatAndDraw(ctx, stave, [note]);
}

/* ── VEXFLOW REPEAT-SIGN RENDERING ── */
function renderVexRepeatSymbol(id, symbolType, color) {
  const container = document.getElementById(id);
  if (!container) return;

  container.innerHTML = '';
  const { Renderer, Stave, StaveNote, Voice, Formatter, Barline, Volta } = Vex.Flow;

  if (symbolType === 'volta') {
    // Extra top margin for the volta bracket + label, extra bottom margin
    // for descending stems on low notes (measured via getBBox: needs ~-8..115).
    const W = 300, H = 150;
    const renderer = new Renderer(container, Renderer.Backends.SVG);
    renderer.resize(W, H);
    const ctx = renderer.getContext();

    const stave1 = new Stave(8, 38, 130);
    stave1.addClef('treble');
    stave1.setEndBarType(Barline.type.REPEAT_END);
    stave1.setVoltaType(Volta.type.BEGIN_END, '1.', -6);
    ctx.setFillStyle('#888'); ctx.setStrokeStyle('#888');
    stave1.setContext(ctx).draw();

    const stave2 = new Stave(138, 38, 130);
    stave2.setEndBarType(Barline.type.END);
    stave2.setVoltaType(Volta.type.BEGIN_END, '2.', -6);
    stave2.setContext(ctx).draw();

    const notes1 = ['c/4', 'e/4', 'g/4', 'c/5'].map(k => new StaveNote({ keys: [k], duration: 'q' }));
    const notes2 = ['d/4', 'f/4', 'a/4', 'd/5'].map(k => new StaveNote({ keys: [k], duration: 'q' }));
    ctx.setFillStyle(color); ctx.setStrokeStyle(color);

    const voice1 = new Voice({ num_beats: 4, beat_value: 4 }).setStrict(false).addTickables(notes1);
    new Formatter().joinVoices([voice1]).format([voice1], 100);
    voice1.draw(ctx, stave1);

    const voice2 = new Voice({ num_beats: 4, beat_value: 4 }).setStrict(false).addTickables(notes2);
    new Formatter().joinVoices([voice2]).format([voice2], 100);
    voice2.draw(ctx, stave2);
    return;
  }

  // 'both' (||: ... :||)  or  'end_only' (... :||)
  // Extra bottom margin for descending stems on high notes like c/5
  // (measured via getBBox: content reaches ~y=112 with a 90px-tall canvas).
  const W = 170, H = 130;
  const renderer = new Renderer(container, Renderer.Backends.SVG);
  renderer.resize(W, H);
  const ctx = renderer.getContext();

  const stave = new Stave(8, 20, 145);
  stave.addClef('treble');
  if (symbolType === 'both') stave.setBegBarType(Barline.type.REPEAT_BEGIN);
  stave.setEndBarType(Barline.type.REPEAT_END);
  ctx.setFillStyle('#888'); ctx.setStrokeStyle('#888');
  stave.setContext(ctx).draw();

  ctx.setFillStyle(color); ctx.setStrokeStyle(color);
  const notes = ['c/4', 'e/4', 'g/4', 'c/5'].map(k => new StaveNote({ keys: [k], duration: 'q' }));
  const voice = new Voice({ num_beats: 4, beat_value: 4 }).setStrict(false).addTickables(notes);
  new Formatter().joinVoices([voice]).format([voice], 90);
  voice.draw(ctx, stave);
}

/* ── PLAY REST DEMO ── */
function playRest(slideId) {
  const el = document.getElementById(slideId);
  if (!el || !el._restState) return;
  const { beats, dotCount, dotIds, beatDisplay, btnId, statusId } = el._restState;

  const btn      = document.getElementById(btnId);
  const statusEl = document.getElementById(statusId);
  if (btn) { btn.disabled = true; btn.textContent = '재생 중...'; }
  dotIds.forEach(id => {
    const d = document.getElementById(id);
    if (d) d.classList.remove('active', 'done');
  });

  const ctx         = getAudioCtx();
  const noteDur     = 0.30;
  const noteGap     = 0.12;
  const beatDur     = 0.55;
  const beforeNotes = ['C4', 'E4'];
  const afterNotes  = ['G4', 'G4'];

  function schedNote(noteKey, startT, gain) {
    const freq = NOTE_FREQ[noteKey] || 440;
    const osc  = ctx.createOscillator();
    const g    = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.setPeriodicWave(getViolinWave(ctx));
    osc.frequency.setValueAtTime(freq, startT);
    g.gain.setValueAtTime(0, startT);
    g.gain.linearRampToValueAtTime(gain, startT + 0.03);
    g.gain.setValueAtTime(gain, startT + noteDur - 0.05);
    g.gain.linearRampToValueAtTime(0, startT + noteDur);
    osc.start(startT); osc.stop(startT + noteDur + 0.01);
  }

  const t0 = ctx.currentTime;
  if (statusEl) statusEl.textContent = '🎵 연주 중...';
  beforeNotes.forEach((n, i) => schedNote(n, t0 + i * (noteDur + noteGap), 0.35));

  const silenceStart = beforeNotes.length * (noteDur + noteGap);

  // Pre-schedule one tick per dot (each beatDur apart)
  for (let i = 0; i < dotCount; i++) {
    const tickT = t0 + silenceStart + i * beatDur;
    const to    = ctx.createOscillator();
    const tg    = ctx.createGain();
    to.connect(tg); tg.connect(ctx.destination);
    to.type = 'sine'; to.frequency.setValueAtTime(1200, tickT);
    tg.gain.setValueAtTime(0, tickT);
    tg.gain.linearRampToValueAtTime(0.07, tickT + 0.008);
    tg.gain.linearRampToValueAtTime(0, tickT + 0.055);
    to.start(tickT); to.stop(tickT + 0.06);
  }

  setTimeout(() => {
    if (statusEl) statusEl.textContent = `🤫 쉬는 중... ${beatDisplay}를 세요!`;
  }, silenceStart * 1000);

  for (let i = 0; i < dotCount; i++) {
    setTimeout(() => {
      if (statusEl) {
        statusEl.textContent = beats < 1
          ? `🤫 반 박자! (짧게!)`
          : `🤫 ${i + 1} / ${dotCount} 박자`;
      }
      const d = document.getElementById(dotIds[i]);
      if (d) d.classList.add('active');
      setTimeout(() => {
        if (d) { d.classList.remove('active'); d.classList.add('done'); }
      }, beats < 1 ? 150 : 260);
    }, (silenceStart + i * beatDur) * 1000);
  }

  const silenceEnd = silenceStart + beats * beatDur;
  setTimeout(() => {
    if (statusEl) statusEl.textContent = '🎵 다시 연주!';
    const t1 = ctx.currentTime;
    afterNotes.forEach((n, i) => schedNote(n, t1 + i * (noteDur + noteGap), 0.35));
  }, silenceEnd * 1000);

  const totalMs = (silenceEnd + afterNotes.length * (noteDur + noteGap) + 0.6) * 1000;
  setTimeout(() => {
    if (btn) { btn.disabled = false; btn.textContent = '▶ 다시 들어보기'; }
    if (statusEl) statusEl.textContent = '버튼을 눌러서 쉼표가 뭔지 들어봐요!';
    dotIds.forEach(id => {
      const d = document.getElementById(id);
      if (d) d.classList.remove('active', 'done');
    });
  }, totalMs);
}

function playOrnament(slideId) {
  const el = slideEls.find(e => e.id === slideId);
  if (!el || !el._ornState) return;
  const { audioType, rId, dotId, btnId, color } = el._ornState;
  const btn = document.getElementById(btnId);
  if (btn) { btn.disabled = true; btn.textContent = '▶ 재생 중...'; }
  const ctx = getAudioCtx();

  if (audioType === 'tremolo') {
    const freq = 293.66;
    const noteOn = 0.055, noteOff = 0.018, num = 38;
    for (let i = 0; i < num; i++) {
      const t = ctx.currentTime + i * (noteOn + noteOff);
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.setPeriodicWave(getViolinWave(ctx));
      osc.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.38, t + 0.01);
      g.gain.setValueAtTime(0.38, t + noteOn - 0.01);
      g.gain.linearRampToValueAtTime(0, t + noteOn);
      osc.start(t); osc.stop(t + noteOn + 0.005);
      setTimeout(() => {
        animateRipples(rId, color, 0.5, 18, 44);
        const d = document.getElementById(dotId);
        if (d) d.style.transform = `scale(${1.4 + Math.random() * 0.6})`;
      }, i * (noteOn + noteOff) * 1000);
    }
    const totalMs = num * (noteOn + noteOff) * 1000;
    setTimeout(() => {
      if (btn) { btn.disabled = false; btn.textContent = '▶ 다시 들어보기'; }
      clearRipples(rId);
      const d = document.getElementById(dotId); if (d) d.style.transform = 'scale(1)';
    }, totalMs + 200);

  } else {
    const freqs = [261.63, 293.66];
    const noteLen = 0.058, num = 44;
    for (let i = 0; i < num; i++) {
      const freq = freqs[i % 2], t = ctx.currentTime + i * noteLen;
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.setPeriodicWave(getViolinWave(ctx));
      osc.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.32, t);
      g.gain.setValueAtTime(0.32, t + noteLen - 0.006);
      g.gain.linearRampToValueAtTime(0, t + noteLen);
      osc.start(t); osc.stop(t + noteLen + 0.005);
      setTimeout(() => {
        const col = i % 2 === 0 ? color : '#AAAAAA';
        animateRipples(rId, col, 0.5, 12, 38);
        const d = document.getElementById(dotId);
        if (d) d.style.transform = `scale(${1.1 + (i % 2) * 0.5})`;
      }, i * noteLen * 1000);
    }
    const totalMs = num * noteLen * 1000;
    setTimeout(() => {
      if (btn) { btn.disabled = false; btn.textContent = '▶ 다시 들어보기'; }
      clearRipples(rId);
      const d = document.getElementById(dotId); if (d) d.style.transform = 'scale(1)';
    }, totalMs + 200);
  }
}

  const statusId = slideId + '-jstatus';

      <div class="journey-step" id="${slideId}-step-${i}">
        <div class="j-bar-wrap"><div class="j-bar" style="height:${barH}px"></div></div>
        <div class="j-symbol">${step.symbol}</div>
        <div class="j-label">${step.label}</div>
      </div>`;
  }).join('');
  const el = document.createElement('div');
  el.className = 'slide';
  el.innerHTML = `
    <h1 class="slide-title" style="font-size:clamp(15px,2.4vw,20px);">${isCresc ? '📈' : '📉'} ${s.title}</h1>
    <div class="journey-card ${cl}">
      <div class="journey-header-sub">${s.subtitle}</div>
      <div class="journey-steps">${stepsHtml}</div>
      <div class="journey-status" id="${statusId}">▶ 버튼을 눌러서 시작해봐요!</div>
      <button class="journey-btn" id="${btnId}" onclick="playDynamicJourney('${slideId}')">▶ 들어보기</button>
    </div>`;
  el._journeyState = { steps, melody, btnId, statusId, colorDark };
  return el;
}

function playDynamicJourney(slideId) {
  const el = slideEls.find(e => e.id === slideId);
  if (!el || !el._journeyState) return;
  const { steps, melody, btnId, statusId, colorDark } = el._journeyState;
  const btn = document.getElementById(btnId);
  const statusEl = document.getElementById(statusId);
  if (btn) { btn.disabled = true; btn.textContent = '재생 중...'; }

  const ctx = getAudioCtx();
  const noteDur = 0.32, noteGap = 0.04;
  const melodyDur = melody.length * (noteDur + noteGap);
  const stepGap = 0.5;

  steps.forEach((_, i) => {
    const s = document.getElementById(`${slideId}-step-${i}`);
    if (s) s.classList.remove('step-active', 'step-done');
  });

  steps.forEach((step, si) => {
    const delayMs = si * (melodyDur + stepGap) * 1000;
    setTimeout(() => {
      if (si > 0) {
        const prev = document.getElementById(`${slideId}-step-${si - 1}`);
        if (prev) { prev.classList.remove('step-active'); prev.classList.add('step-done'); }
      }
      const cur = document.getElementById(`${slideId}-step-${si}`);
      if (cur) cur.classList.add('step-active');
      if (statusEl) {
        const parts = steps.map((st, i) => {
          if (i < si)   return `<span style="opacity:0.35">${st.symbol}</span>`;
          if (i === si) return `<strong style="color:${colorDark}">${st.symbol} — ${st.label}</strong>`;
          return `<span style="opacity:0.25">${st.symbol}</span>`;
        }).join('<span style="margin:0 4px;opacity:0.3">→</span>');
        statusEl.innerHTML = parts;
      }
    }, delayMs);

    const audioT = ctx.currentTime + si * (melodyDur + stepGap);
    melody.forEach((note, ni) => {
      const freq = NOTE_FREQ[note] || 440;
      const t = audioT + ni * (noteDur + noteGap);
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.setPeriodicWave(getViolinWave(ctx));
      osc.frequency.setValueAtTime(freq, t);
      const lfo2 = ctx.createOscillator(), lfoG2 = ctx.createGain();
      lfo2.type = 'sine'; lfo2.frequency.setValueAtTime(5.5, t);
      lfoG2.gain.setValueAtTime(0, t);
      lfoG2.gain.linearRampToValueAtTime(freq * 0.015, t + 0.08);
      lfoG2.gain.setValueAtTime(freq * 0.015, t + noteDur - 0.07);
      lfoG2.gain.linearRampToValueAtTime(0, t + noteDur);
      lfo2.connect(lfoG2); lfoG2.connect(osc.frequency);
      lfo2.start(t); lfo2.stop(t + noteDur + 0.01);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(step.gain, t + 0.03);
      g.gain.setValueAtTime(step.gain, t + noteDur - 0.06);
      g.gain.linearRampToValueAtTime(0, t + noteDur);
      osc.start(t); osc.stop(t + noteDur + 0.01);
    });
  });

  const totalMs = (melodyDur * steps.length + stepGap * (steps.length - 1)) * 1000;
  setTimeout(() => {
    steps.forEach((_, i) => {
      const s = document.getElementById(`${slideId}-step-${i}`);
      if (s) { s.classList.remove('step-active'); s.classList.add('step-done'); }
    });
    if (btn) { btn.disabled = false; btn.textContent = '▶ 다시 들어보기'; }
    if (statusEl) statusEl.textContent = '🎉 어때요? 소리가 달라지는 게 느껴졌나요?';
    setTimeout(() => {
      steps.forEach((_, i) => {
        const s = document.getElementById(`${slideId}-step-${i}`);
        if (s) s.classList.remove('step-done');
      });
      if (statusEl) statusEl.textContent = '▶ 버튼을 눌러서 시작해봐요!';
    }, 2500);
  }, totalMs + 200);
}

  const statusId = slideId + '-rdst';

  const pillsA = s.melody_a.map((n, i) =>
    `<span class="rdemo-pill" id="${slideId}-a-${i}">${n.replace(/[0-9]/g, '')}</span>`
  ).join('');
  const pillsB = s.melody_b.map((n, i) =>
    `<span class="rdemo-pill" id="${slideId}-b-${i}">${n.replace(/[0-9]/g, '')}</span>`
  ).join('');

  const el = document.createElement('div');
  el.className = 'slide';
  el.innerHTML = `
    <h1 class="slide-title" style="font-size:clamp(15px,2.2vw,21px);">🔁 ${s.title}</h1>
    <p class="slide-subtitle" style="font-size:12px;text-align:center;">${s.subtitle}</p>
    <div class="rdemo-card ${cl}">
      <div class="rdemo-row">
        <span class="rdemo-bar-mark">‖:</span>
        ${pillsA}
        <span class="rdemo-bar-mark">:‖</span>
      </div>
      <div class="rdemo-group-label">도돌이표 구간 (2번 연주)</div>
      <div class="rdemo-row">
        ${pillsB}
      </div>
      <div class="rdemo-group-label">그 다음 (1번만 연주)</div>
      <div class="rdemo-status" id="${statusId}">▶ 버튼을 눌러서 도돌이표를 들어봐요!</div>
      <button class="rdemo-btn" id="${btnId}" onclick="playRepeatDemo('${slideId}')">▶ 들어보기</button>
    </div>`;

  el._repeatDemoState = { melodyA: s.melody_a, melodyB: s.melody_b, btnId, statusId };
  return el;
}

/* ── PLAY REPEAT DEMO ── */
function playRepeatDemo(slideId) {
  const el = slideEls.find(e => e.id === slideId);
  if (!el || !el._repeatDemoState) return;
  const { melodyA, melodyB, btnId, statusId } = el._repeatDemoState;

  const btn = document.getElementById(btnId);
  const statusEl = document.getElementById(statusId);
  if (btn) { btn.disabled = true; btn.textContent = '재생 중...'; }

  const allPillIds = [
    ...melodyA.map((_, i) => `${slideId}-a-${i}`),
    ...melodyB.map((_, i) => `${slideId}-b-${i}`)
  ];
  allPillIds.forEach(id => {
    const p = document.getElementById(id);
    if (p) p.classList.remove('active', 'played');
  });

  const ctx = getAudioCtx();
  const noteDur = 0.3, noteGap = 0.05;
  const step = noteDur + noteGap;

  function schedNote(noteKey, startT) {
    const freq = NOTE_FREQ[noteKey] || 440;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.setPeriodicWave(getViolinWave(ctx));
    osc.frequency.setValueAtTime(freq, startT);
    g.gain.setValueAtTime(0, startT);
    g.gain.linearRampToValueAtTime(0.35, startT + 0.03);
    g.gain.setValueAtTime(0.35, startT + noteDur - 0.05);
    g.gain.linearRampToValueAtTime(0, startT + noteDur);
    osc.start(startT); osc.stop(startT + noteDur + 0.01);
  }

  // sequence: [pass1: A] [pass2: A] [B] — every note advances audio and
  // visual time by the exact same `step`, so they never drift apart.
  const seq = [];
  melodyA.forEach((n, i) => seq.push({ note: n, pillId: `${slideId}-a-${i}`, label: '▶ 1번째로 연주 중 (A)' }));
  melodyA.forEach((n, i) => seq.push({ note: n, pillId: `${slideId}-a-${i}`, label: '🔁 다시 연주 중 (A)' }));
  melodyB.forEach((n, i) => seq.push({ note: n, pillId: `${slideId}-b-${i}`, label: '▶ 그 다음 (B, 한 번만)' }));

  const t0 = ctx.currentTime;
  let audioT = t0;
  let visualMs = 0;

  seq.forEach(item => {
    schedNote(item.note, audioT);
    const delayMs = visualMs;
    setTimeout(() => {
      if (statusEl) statusEl.textContent = item.label;
      const p = document.getElementById(item.pillId);
      if (p) { p.classList.remove('played'); p.classList.add('active'); }
      setTimeout(() => {
        if (p) { p.classList.remove('active'); p.classList.add('played'); }
      }, step * 1000 * 0.85);
    }, delayMs);
    audioT += step;
    visualMs += step * 1000;
  });

  setTimeout(() => {
    if (btn) { btn.disabled = false; btn.textContent = '▶ 다시 들어보기'; }
    if (statusEl) statusEl.textContent = '🎉 A를 두 번, B를 한 번 연주했어요!';
    setTimeout(() => {
      allPillIds.forEach(id => {
        const p = document.getElementById(id);
        if (p) p.classList.remove('active', 'played');
      });
      if (statusEl) statusEl.textContent = '▶ 버튼을 눌러서 도돌이표를 들어봐요!';
    }, 2200);
  }, visualMs + 250);
}

/* ── TEMPO BUILDER ── */

          <div class="listen-box">
            <div class="listen-label">👂 이렇게 들어봐요!</div>
            ${yt.tips.map(t => `<div class="listen-item">• ${t}</div>`).join('')}

/* ── QUIZ LOGIC ── */
function renderQuestion(slideId) {
  const el = slideEls.find(e => e._slideId === slideId);
  if (!el) return;
  const q = el._quizData[quizState.current];
  el.querySelector(`#qz-meta-${slideId}`).textContent = `${quizState.current+1} / ${el._quizData.length}`;
  el.querySelector(`#qz-q-${slideId}`).textContent = (quizState.current+1) + '. ' + q.q;
  el.querySelector(`#qz-res-${slideId}`).textContent = '';
  el.querySelector(`#qz-res-${slideId}`).className = 'quiz-result';
  el.querySelector(`#qz-next-${slideId}`).style.display = 'none';
  quizState.answered = false;
  const optsEl = el.querySelector(`#qz-opts-${slideId}`);
  optsEl.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt;
    btn.onclick = () => answerQuestion(slideId, i, btn);
    optsEl.appendChild(btn);
  });
  updateBottomNextBtn();
}

function answerQuestion(slideId, chosen, btn) {
  if (quizState.answered) return;
  quizState.answered = true;
  const el = slideEls.find(e => e._slideId === slideId);
  const q = el._quizData[quizState.current];
  el.querySelectorAll('.quiz-opt').forEach(b => b.disabled = true);
  const resEl = el.querySelector(`#qz-res-${slideId}`);
  if (chosen === q.answer) {
    btn.classList.add('correct');
    resEl.textContent = '🎉 맞았어요! 아주 잘했어요!';
    resEl.className = 'quiz-result ok';
    quizState.score++;
  } else {
    btn.classList.add('wrong');
    el.querySelectorAll('.quiz-opt')[q.answer].classList.add('correct');
    resEl.textContent = `🤔 아쉬워요! 정답은 "${q.options[q.answer]}"이에요.`;
    resEl.className = 'quiz-result bad';
  }
  const isLast = quizState.current >= el._quizData.length - 1;
  if (!isLast) {
    el.querySelector(`#qz-next-${slideId}`).style.display = 'inline-flex';
  } else {
    document.getElementById('btn-next').textContent = '결과 보기 🌟';
    document.getElementById('btn-next').className = 'btn btn-green';
    document.getElementById('btn-next').disabled = false;
  }
}

function nextQuestion(slideId) {
  quizState.current++;
  renderQuestion(slideId);
}

function canAdvanceFromCurrentSlide() {
  const el = slideEls[currentIdx];
  if (!el || !el._quizData) return true;
  const isLastQuestion = quizState.current >= el._quizData.length - 1;
  return quizState.answered && isLastQuestion;
}

/* ── AUDIO PLAY ── */
function playExp(slideId) {
  const el = slideEls.find(e => e._playState && e.id === slideId);
  if (!el) return;
  const { cfg, rId, dotId, progId, emojiId, btnId, color, isCres } = el._playState;
  const btn = document.getElementById(btnId);
  const dot = document.getElementById(dotId);
  const prog = document.getElementById(progId);
  const emojiEl = document.getElementById(emojiId);
  if (btn) { btn.disabled = true; btn.textContent = '▶ 재생 중...'; }
  playTone(cfg,
    p => {
      const minR = isCres ? 20 : 110, maxR = isCres ? 110 : 20;
      animateRipples(rId, color, p, minR, maxR);
      const scale = isCres ? 1 + p*2 : 3 - p*2;
      if (dot) dot.style.transform = `scale(${scale})`;
      if (prog) prog.style.width = (p*100)+'%';
      if (emojiEl) emojiEl.textContent = sizeEmoji(p, !isCres);
    },
    () => {
      if (btn) { btn.disabled = false; btn.textContent = '▶ 다시 듣기'; }
      if (dot) dot.style.transform = 'scale(1)';
      if (prog) prog.style.width = '0%';
      clearRipples(rId);
      if (emojiEl) emojiEl.textContent = isCres ? '🔈' : '🔊';
    }
  );
}

function playMini(slideId, i) {
  const el = slideEls.find(e => e.id === slideId);
  if (!el || !el._miniStates) return;
  const { cfg, rId, dotId, col, isCres } = el._miniStates[i];
  const dot = document.getElementById(dotId);
  playTone(cfg,
    p => {
      const minR = isCres ? 10 : 60, maxR = isCres ? 60 : 10;
      animateRipples(rId, col, p, minR, maxR);
      const scale = isCres ? 1+p*1.5 : 2.5-p*1.5;
      if (dot) dot.style.transform = `scale(${scale})`;
    },
    () => {
      if (dot) dot.style.transform = 'scale(1)';
      clearRipples(rId);
    }
  );
}

/* ── NAVIGATION ── */
let isNavigating = false;
function navigate(dir) {
  // Guard against double-clicks firing navigate() again before the 0.35s
  // CSS opacity/transform transition finishes — without this, a second
  // slide can be marked "active" while the previous one is still fading
  // out, and both render on top of each other for a moment.
  if (isNavigating) return;
  if (dir > 0 && !canAdvanceFromCurrentSlide()) return;
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= totalSlides) return;
  isNavigating = true;
  const curr = slideEls[currentIdx];
  curr.classList.add('exit-left');
  curr.classList.remove('active');
  setTimeout(() => { curr.classList.remove('exit-left'); isNavigating = false; }, 380);
  currentIdx = newIdx;
  slideEls[currentIdx].classList.add('active');
  updateNav();

  // init quiz on arrival
  const el = slideEls[currentIdx];
  if (el._quizData && el._slideId) {
    quizState = { current: 0, score: 0, answered: false };
    renderQuestion(el._slideId);
  }
  // update result
  if (el._isResult) updateResult();
}

function updateBottomNextBtn() {
  // called after quiz render to reset btn state
  const btn = document.getElementById('btn-next');
  btn.textContent = '결과 보기 🌟';
  btn.className = 'btn btn-green';
  btn.disabled = true;
}

function updateNav() {
  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');
  prev.disabled = currentIdx === 0;

  const el = slideEls[currentIdx];
  if (el._isResult) {
    next.style.display = 'none';
  } else {
    next.style.display = '';
    next.disabled = false;
    if (el._quizData) {
      next.textContent = '결과 보기 🌟';
      next.className = 'btn btn-green';
      next.disabled = !canAdvanceFromCurrentSlide();
    } else {
      next.textContent = currentIdx === totalSlides - 2 ? '결과 보기 🌟' : '다음 →';
      next.className = currentIdx === totalSlides - 2 ? 'btn btn-green' : 'btn btn-primary';
    }
  }

  // dots
  const dotsBar = document.getElementById('dots-bar');
  dotsBar.innerHTML = '';
  for (let i = 0; i < totalSlides; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === currentIdx ? ' active' : '');
    d.onclick = () => { if (i !== currentIdx) navigate(i - currentIdx); };
    dotsBar.appendChild(d);
  }
  document.getElementById('slide-counter').textContent = `${currentIdx+1} / ${totalSlides}`;
}

function updateResult() {
  const total = L.slides.find(s=>s.type==='quiz')?.questions.length || 4;
  const score = quizState.score;
  const idx = Math.round((score / total) * 4);
  const chars = ['😢','🙂','😊','😄','🌟'];
  const msgs  = ['괜찮아요! 다시 공부해봐요.','조금 더 연습해봐요!','잘했어요!','훌륭해요! 아주 잘했어요!','완벽해요! 음악 천재! 🎵'];
  const learned = L.meta.result_message || `${L.meta.title}를 배웠어요!`;
  const r = document.getElementById('res-char');
  const s = document.getElementById('res-score');
  const m = document.getElementById('res-msg');
  if (r) r.textContent = chars[idx];
  if (s) s.textContent = `${score} / ${total} 점`;
  if (m) m.textContent = msgs[idx] + '\n' + learned;
}

function restart() {
  quizState = { current: 0, score: 0, answered: false };
  const curr = slideEls[currentIdx];
  curr.classList.remove('active');
  currentIdx = 0;
  slideEls[0].classList.add('active');
  updateNav();
}

/* ── LESSON LOADER ── */
function loadLesson(data) {
  L = data;
  const meta = L.meta;

  // apply color variables
  document.documentElement.style.setProperty('--ca', meta.color_a);
  document.documentElement.style.setProperty('--cb', meta.color_b);
  document.documentElement.style.setProperty('--ca-light', meta.color_a_light);
  document.documentElement.style.setProperty('--cb-light', meta.color_b_light);
  document.documentElement.style.setProperty('--ca-dark',  meta.color_a_dark);
  document.documentElement.style.setProperty('--cb-dark',  meta.color_b_dark);
  if (meta.color_a_border) document.documentElement.style.setProperty('--ca-border', meta.color_a_border);
  if (meta.color_b_border) document.documentElement.style.setProperty('--cb-border', meta.color_b_border);

  // stash concepts for result slide
  const introSlide = L.slides.find(s => s.type === 'intro');
  if (introSlide) meta._concepts = introSlide.concepts;

  document.getElementById('lesson-title-bar').textContent = `🎵 ${meta.title}`;
  document.title = meta.title + ' — 음악 수업';

  const wrap = document.getElementById('slides-wrap');
  wrap.innerHTML = '';
  slideEls.length = 0;

  let idx = 0;
  L.slides.forEach(s => {
    const sid = 'slide-' + idx;
    let el;
    if      (s.type === 'intro')      el = buildIntro(s, meta);
    else if (s.type === 'experience') el = buildExperience(s, meta, sid);
    else if (s.type === 'compare')    el = buildCompare(s, meta, sid);
    else if (s.type === 'quiz')       el = buildQuiz(s, meta, sid);
    else if (s.type === 'timeline')   el = buildTimeline(s, meta);
    else if (s.type === 'features')   el = buildFeatures(s, meta);
    else if (s.type === 'composer')   el = buildComposer(s, meta);
    else if (s.type === 'review')     el = buildReview(s, meta, sid);
    else if (s.type === 'tempo')           el = buildTempo(s, meta);
    else if (s.type === 'dynamic')         el = buildDynamic(s, meta, sid);
    else if (s.type === 'dynamic_journey') el = buildDynamicJourney(s, meta, sid);
    else if (s.type === 'ornament')        el = buildOrnament(s, meta, sid);
    else if (s.type === 'rest')            el = buildRest(s, meta, sid);
    else if (s.type === 'repeat_symbol')   el = buildRepeatSymbol(s, meta, sid);
    else if (s.type === 'repeat_demo')     el = buildRepeatDemo(s, meta, sid);
    else return;
    el.id = sid;
    wrap.appendChild(el);
    slideEls.push(el);
    idx++;
  });

  // result slide
  const resultEl = buildResult(meta, []);
  resultEl.id = 'slide-result';
  resultEl._isResult = true;
  wrap.appendChild(resultEl);
  slideEls.push(resultEl);

  totalSlides = slideEls.length;
  currentIdx = 0;
  slideEls[0].classList.add('active');

  // init first quiz if it's slide 0 (unlikely but safe)
  const firstQuizEl = slideEls.find(e => e._quizData);
  if (firstQuizEl && firstQuizEl === slideEls[0]) renderQuestion(firstQuizEl._slideId);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('file-picker').style.display = 'none';
  document.getElementById('topbar').style.display = '';
  document.getElementById('slides-wrap').style.display = '';
  document.getElementById('bottom-nav').style.display = '';
  updateNav();

  // Render VexFlow rest notation after DOM is settled
  setTimeout(flushVexRenders, 0);
}

/* ── FILE LOADING ── */
function loadFromFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try { loadLesson(JSON.parse(e.target.result)); }
    catch(err) { alert('JSON 파일을 읽을 수 없어요: ' + err.message); }
  };
  reader.readAsText(file);
}

document.getElementById('file-input').onchange = e => {
  if (e.target.files[0]) loadFromFile(e.target.files[0]);
};

const dz = document.getElementById('file-drop-zone');
dz.ondragover = e => { e.preventDefault(); dz.style.borderColor = 'var(--ca)'; };
dz.ondragleave = () => { dz.style.borderColor = '#BBB'; };
dz.ondrop = e => { e.preventDefault(); dz.style.borderColor = '#BBB'; if (e.dataTransfer.files[0]) loadFromFile(e.dataTransfer.files[0]); };

/* ── INIT: try URL param or fetch ── */
(async () => {
  const params = new URLSearchParams(location.search);
  const lessonPath = params.get('lesson');
  if (lessonPath) {
    try {
      const res = await fetch(lessonPath);
      if (!res.ok) throw new Error(res.status);
      loadLesson(await res.json());
    } catch(e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('file-picker').style.display = 'flex';
    }
  } else {
    // try default
    try {
      const res = await fetch('lessons/01-crescendo.json');
      if (!res.ok) throw new Error();
      loadLesson(await res.json());
    } catch {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('file-picker').style.display = 'flex';
    }
  }
})();
